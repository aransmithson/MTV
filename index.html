<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoucherVault - Shopping Voucher Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Outfit', sans-serif; }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .voucher-card {
            background: linear-gradient(145deg, rgba(51, 65, 85, 0.8), rgba(30, 41, 59, 0.9));
            border: 1px solid rgba(99, 102, 241, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .voucher-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.1), transparent);
            transition: left 0.5s;
        }

        .voucher-card:hover::before {
            left: 100%;
        }

        .voucher-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.3);
        }

        .voucher-card.spent {
            opacity: 0.85;
            border-color: rgba(239, 68, 68, 0.3);
            background: linear-gradient(145deg, rgba(51, 65, 85, 0.6), rgba(30, 41, 59, 0.7));
        }

        .voucher-card.spent:hover {
            border-color: rgba(239, 68, 68, 0.5);
            box-shadow: 0 20px 40px -10px rgba(239, 68, 68, 0.2);
        }

        .status-badge {
            position: relative;
            overflow: hidden;
        }

        .status-badge::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .status-badge:active::after {
            width: 100px;
            height: 100px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.3s;
        }

        .btn-primary:hover::after {
            left: 100%;
        }

        .modal-enter {
            animation: modalIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .slide-in {
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .floating-input {
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(99, 102, 241, 0.2);
            transition: all 0.3s;
        }

        .floating-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            outline: none;
        }

        .tab-active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .image-preview {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 2px dashed rgba(99, 102, 241, 0.3);
            transition: all 0.3s;
        }

        .image-preview:hover {
            border-color: #6366f1;
            background: linear-gradient(135deg, #1e293b, #1e1b4b);
        }

        .user-avatar {
            background: linear-gradient(135deg, #6366f1, #ec4899);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .delete-btn {
            opacity: 0;
            transition: all 0.3s;
        }

        .voucher-card:hover .delete-btn {
            opacity: 1;
        }

        .spent-stamp {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            border: 3px solid #ef4444;
            color: #ef4444;
            padding: 8px 24px;
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            border-radius: 8px;
            opacity: 0.8;
            pointer-events: none;
            z-index: 10;
        }

        .empty-state {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.5), rgba(15, 23, 42, 0.5));
        }

        /* Timeline Styles */
        .timeline-container {
            position: relative;
            padding-left: 2rem;
        }

        .timeline-container::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #6366f1, #ec4899, #6366f1);
            border-radius: 1px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -2rem;
            top: 1.5rem;
            width: 12px;
            height: 12px;
            background: #6366f1;
            border: 3px solid #0f172a;
            border-radius: 50%;
            transform: translateX(-5px);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }

        .timeline-date-header {
            position: sticky;
            top: 80px;
            z-index: 10;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            margin-left: -2rem;
        }

        .timeline-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .spent-by-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .toast {
            animation: toastIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .amount-display {
            background: linear-gradient(135deg, #f59e0b, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .amount-display.spent-amount {
            background: linear-gradient(135deg, #94a3b8, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loading-spinner {
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="antialiased">
    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Auth Screen -->
    <div id="authScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass-panel rounded-3xl p-8 w-full max-w-md slide-in">
            <div class="text-center mb-8">
                <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-2xl">
                    <i class="fas fa-ticket-alt text-3xl text-white"></i>
                </div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">VoucherVault</h1>
                <p class="text-slate-400 mt-2">Manage your shopping vouchers</p>
            </div>

            <div id="authTabs" class="flex bg-slate-800/50 rounded-xl p-1 mb-6">
                <button onclick="switchAuthTab('login')" id="loginTab" class="flex-1 py-2.5 rounded-lg text-sm font-medium transition-all tab-active">Sign In</button>
                <button onclick="switchAuthTab('register')" id="registerTab" class="flex-1 py-2.5 rounded-lg text-sm font-medium text-slate-400 transition-all hover:text-white">New Account</button>
            </div>

            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
                        <input type="text" id="authUsername" required class="floating-input w-full px-4 py-3 rounded-xl text-white placeholder-slate-500" placeholder="Enter username">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
                        <input type="password" id="authPassword" required class="floating-input w-full px-4 py-3 rounded-xl text-white placeholder-slate-500" placeholder="Enter password">
                    </div>
                </div>
                <button type="submit" id="authSubmitBtn" class="btn-primary w-full mt-6 py-3.5 rounded-xl font-semibold text-white shadow-lg hover:shadow-xl transition-all transform hover:scale-[1.02]">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden min-h-screen">
        <!-- Header -->
        <header class="glass-panel sticky top-0 z-40 border-b border-white/5">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg">
                            <i class="fas fa-ticket-alt text-lg text-white"></i>
                        </div>
                        <div>
                            <h1 class="text-xl font-bold text-white">VoucherVault</h1>
                            <p class="text-xs text-slate-400" id="userDisplayName">Welcome back</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="openAddModal()" class="btn-primary px-5 py-2.5 rounded-xl font-medium text-white shadow-lg hover:shadow-xl transition-all flex items-center gap-2">
                            <i class="fas fa-plus"></i>
                            <span class="hidden sm:inline">Add Voucher</span>
                        </button>
                        <div class="relative group">
                            <button class="user-avatar w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm">
                                <span id="userInitials">U</span>
                            </button>
                            <div class="absolute right-0 mt-2 w-48 glass-panel rounded-xl p-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all transform origin-top-right">
                                <button onclick="logout()" class="w-full text-left px-4 py-2 rounded-lg text-red-400 hover:bg-red-500/10 transition-colors flex items-center gap-2">
                                    <i class="fas fa-sign-out-alt text-sm"></i> Sign Out
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Filters -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 pt-6 pb-6">
            <div class="flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between">
                <div class="flex bg-slate-800/50 rounded-xl p-1">
                    <button onclick="setFilter('unspent')" id="filterUnspent" class="filter-btn px-6 py-2.5 rounded-lg text-sm font-medium transition-all tab-active">
                        <i class="fas fa-wallet mr-2"></i>Unspent
                    </button>
                    <button onclick="setFilter('spent')" id="filterSpent" class="filter-btn px-6 py-2.5 rounded-lg text-sm font-medium text-slate-400 transition-all hover:text-white">
                        <i class="fas fa-history mr-2"></i>Spent Timeline
                    </button>
                </div>
            </div>
        </div>

        <!-- Voucher Content -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 pb-12">
            <!-- Unspent Grid View -->
            <div id="unspentView" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Unspent vouchers injected here -->
            </div>

            <!-- Spent Timeline View -->
            <div id="spentView" class="hidden timeline-container max-w-3xl mx-auto">
                <!-- Spent vouchers timeline injected here -->
            </div>

            <div id="emptyState" class="hidden empty-state rounded-3xl p-12 text-center">
                <div class="w-24 h-24 mx-auto mb-4 rounded-full bg-slate-800 flex items-center justify-center">
                    <i class="fas fa-ticket-alt text-4xl text-slate-600"></i>
                </div>
                <h3 class="text-xl font-semibold text-white mb-2">No vouchers found</h3>
                <p class="text-slate-400">Add your first voucher to get started</p>
            </div>
        </div>
    </div>

    <!-- Add Voucher Modal -->
    <div id="addModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="glass-panel rounded-3xl w-full max-w-lg modal-enter max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-white/5 flex items-center justify-between">
                <h2 class="text-xl font-bold text-white">Add New Voucher</h2>
                <button onclick="closeAddModal()" class="w-8 h-8 rounded-lg bg-slate-800 hover:bg-slate-700 flex items-center justify-center transition-colors">
                    <i class="fas fa-times text-slate-400"></i>
                </button>
            </div>
            <form id="addVoucherForm" onsubmit="handleAddVoucher(event)" class="p-6 space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Retailer / Store</label>
                    <input type="text" id="voucherRetailer" required class="floating-input w-full px-4 py-3 rounded-xl text-white placeholder-slate-500" placeholder="e.g. Amazon, Tesco">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1.5">Value (£)</label>
                        <input type="number" id="voucherValue" required step="0.01" min="0.01" class="floating-input w-full px-4 py-3 rounded-xl text-white placeholder-slate-500" placeholder="25.00">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1.5">Voucher Code</label>
                        <input type="text" id="voucherCode" class="floating-input w-full px-4 py-3 rounded-xl text-white placeholder-slate-500" placeholder="Optional">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Expiry Date</label>
                    <input type="date" id="voucherExpiry" class="floating-input w-full px-4 py-3 rounded-xl text-white">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Voucher Image</label>
                    <div class="image-preview rounded-xl p-6 text-center cursor-pointer" onclick="document.getElementById('voucherImage').click()">
                        <input type="file" id="voucherImage" accept="image/*" class="hidden" onchange="previewImage(event)">
                        <div id="imagePreviewContainer">
                            <i class="fas fa-cloud-upload-alt text-3xl text-indigo-400 mb-2"></i>
                            <p class="text-sm text-slate-400">Click to upload image</p>
                            <p class="text-xs text-slate-500 mt-1">JPG, PNG up to 5MB</p>
                        </div>
                        <img id="imagePreview" class="hidden max-h-48 mx-auto rounded-lg shadow-lg">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Notes</label>
                    <textarea id="voucherNotes" rows="3" class="floating-input w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 resize-none" placeholder="Any additional details..."></textarea>
                </div>
                <button type="submit" id="submitBtn" class="btn-primary w-full py-3.5 rounded-xl font-semibold text-white shadow-lg hover:shadow-xl transition-all transform hover:scale-[1.02] flex items-center justify-center gap-2">
                    <span>Add Voucher</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Image Viewer Modal -->
    <div id="imageModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md" onclick="closeImageModal()">
        <div class="relative max-w-4xl w-full modal-enter" onclick="event.stopPropagation()">
            <button onclick="closeImageModal()" class="absolute -top-12 right-0 w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-colors">
                <i class="fas fa-times text-white"></i>
            </button>
            <img id="fullImage" src="" alt="Voucher" class="w-full rounded-2xl shadow-2xl">
            <div class="absolute bottom-4 left-4 right-4 glass-panel rounded-xl p-4">
                <h3 id="imageModalTitle" class="font-bold text-white text-lg"></h3>
                <p id="imageModalDetails" class="text-slate-300 text-sm mt-1"></p>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - UPDATE THESE FOR YOUR DEPLOYMENT
        // ============================================
        const API_BASE_URL = '/api';  // Change to your Worker URL if separate from Pages
        const R2_PUBLIC_URL = '';     // Your R2 public bucket custom domain (e.g., 'https://images.yourdomain.com')

        // ============================================
        // STATE
        // ============================================
        let currentUser = null;
        let authToken = null;
        let currentFilter = 'unspent';
        let tempImageFile = null;

        // ============================================
        // API HELPERS
        // ============================================
        async function apiCall(endpoint, options = {}) {
            const url = `${API_BASE_URL}${endpoint}`;
            const config = {
                headers: {
                    'Content-Type': 'application/json',
                    ...(authToken ? { 'Authorization': `Bearer ${authToken}` } : {}),
                    ...options.headers
                },
                ...options
            };

            if (config.body && typeof config.body === 'object' && !(config.body instanceof FormData)) {
                config.body = JSON.stringify(config.body);
            }

            try {
                const response = await fetch(url, config);

                if (response.status === 401) {
                    logout();
                    showToast('Session expired. Please sign in again.', 'error');
                    throw new Error('Unauthorized');
                }

                if (!response.ok) {
                    const error = await response.json().catch(() => ({ error: 'Request failed' }));
                    throw new Error(error.error || `HTTP ${response.status}`);
                }

                return await response.json();
            } catch (err) {
                console.error('API Error:', err);
                throw err;
            }
        }

        // ============================================
        // AUTH FUNCTIONS
        // ============================================
        function switchAuthTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const submitBtn = document.getElementById('authSubmitBtn');

            if (tab === 'login') {
                loginTab.classList.add('tab-active');
                loginTab.classList.remove('text-slate-400');
                registerTab.classList.remove('tab-active');
                registerTab.classList.add('text-slate-400');
                submitBtn.textContent = 'Sign In';
            } else {
                registerTab.classList.add('tab-active');
                registerTab.classList.remove('text-slate-400');
                loginTab.classList.remove('tab-active');
                loginTab.classList.add('text-slate-400');
                submitBtn.textContent = 'Create Account';
            }
        }

        async function handleAuth(e) {
            e.preventDefault();
            const username = document.getElementById('authUsername').value.trim().toLowerCase();
            const password = document.getElementById('authPassword').value;
            const isLogin = document.getElementById('loginTab').classList.contains('tab-active');

            if (!username || !password) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            try {
                if (isLogin) {
                    const data = await apiCall('/auth/login', {
                        method: 'POST',
                        body: { username, password }
                    });
                    authToken = data.token;
                    currentUser = data.user;
                    showToast('Welcome back!', 'success');
                } else {
                    const data = await apiCall('/auth/register', {
                        method: 'POST',
                        body: { username, password }
                    });
                    authToken = data.token;
                    currentUser = data.user;
                    showToast('Account created successfully!', 'success');
                }

                sessionStorage.setItem('vv_token', authToken);
                sessionStorage.setItem('vv_user', JSON.stringify(currentUser));
                showMainApp();
            } catch (err) {
                showToast(err.message || 'Authentication failed', 'error');
            }
        }

        function logout() {
            currentUser = null;
            authToken = null;
            sessionStorage.removeItem('vv_token');
            sessionStorage.removeItem('vv_user');
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('authForm').reset();
        }

        function showMainApp() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userDisplayName').textContent = `Welcome back, ${currentUser.username}`;
            document.getElementById('userInitials').textContent = currentUser.username.charAt(0).toUpperCase();
            renderVouchers();
        }

        // ============================================
        // VOUCHER FUNCTIONS
        // ============================================
        function openAddModal() {
            document.getElementById('addModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.add('hidden');
            document.body.style.overflow = '';
            document.getElementById('addVoucherForm').reset();
            resetImagePreview();
            tempImageFile = null;
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                showToast('Image must be under 5MB', 'error');
                return;
            }

            tempImageFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreview').classList.remove('hidden');
                document.getElementById('imagePreviewContainer').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        function resetImagePreview() {
            document.getElementById('imagePreview').classList.add('hidden');
            document.getElementById('imagePreviewContainer').classList.remove('hidden');
        }

        async function handleAddVoucher(e) {
            e.preventDefault();

            const retailer = document.getElementById('voucherRetailer').value.trim();
            const value = parseFloat(document.getElementById('voucherValue').value);
            const code = document.getElementById('voucherCode').value.trim();
            const expiry = document.getElementById('voucherExpiry').value;
            const notes = document.getElementById('voucherNotes').value.trim();

            if (!retailer || !value) {
                showToast('Please fill in required fields', 'error');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="loading-spinner"></div><span class="ml-2">Uploading...</span>';

            try {
                let imageUrl = null;

                // Upload image to R2 if selected
                if (tempImageFile) {
                    const formData = new FormData();
                    formData.append('image', tempImageFile);

                    const uploadRes = await fetch(`${API_BASE_URL}/upload`, {
                        method: 'POST',
                        headers: authToken ? { 'Authorization': `Bearer ${authToken}` } : {},
                        body: formData
                    });

                    if (!uploadRes.ok) throw new Error('Image upload failed');
                    const uploadData = await uploadRes.json();
                    imageUrl = uploadData.url;
                }

                // Create voucher
                await apiCall('/vouchers', {
                    method: 'POST',
                    body: {
                        retailer,
                        value,
                        code,
                        expiry,
                        notes,
                        image_url: imageUrl
                    }
                });

                closeAddModal();
                renderVouchers();
                showToast('Voucher added successfully!', 'success');
            } catch (err) {
                showToast(err.message || 'Failed to add voucher', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Add Voucher</span>';
            }
        }

        async function toggleVoucherStatus(id) {
            try {
                const voucher = await apiCall(`/vouchers/${id}/toggle`, { method: 'POST' });

                if (voucher.status === 'spent') {
                    showToast(`Voucher marked as spent by ${voucher.spent_by} at ${formatTime(voucher.spent_at)}`, 'info');
                } else {
                    showToast('Voucher restored to unspent', 'success');
                }

                renderVouchers();
            } catch (err) {
                showToast(err.message || 'Failed to update voucher', 'error');
            }
        }

        async function deleteVoucher(id) {
            if (!confirm('Are you sure you want to delete this voucher?')) return;

            try {
                await apiCall(`/vouchers/${id}`, { method: 'DELETE' });
                renderVouchers();
                showToast('Voucher deleted', 'info');
            } catch (err) {
                showToast(err.message || 'Failed to delete voucher', 'error');
            }
        }

        function viewImage(voucher) {
            const imageUrl = voucher.image_url || voucher.image;
            if (!imageUrl) {
                showToast('No image available for this voucher', 'error');
                return;
            }

            // Construct full R2 URL if needed
            const fullUrl = imageUrl.startsWith('http') ? imageUrl : `${R2_PUBLIC_URL}/${imageUrl}`;

            document.getElementById('fullImage').src = fullUrl;
            document.getElementById('imageModalTitle').textContent = voucher.retailer;
            document.getElementById('imageModalDetails').textContent = `£${parseFloat(voucher.value).toFixed(2)} ${voucher.code ? '| Code: ' + voucher.code : ''}`;
            document.getElementById('imageModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeImageModal() {
            document.getElementById('imageModal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        // ============================================
        // FILTER & RENDER
        // ============================================
        function setFilter(filter) {
            currentFilter = filter;

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('tab-active');
                btn.classList.add('text-slate-400');
            });

            document.getElementById('filter' + filter.charAt(0).toUpperCase() + filter.slice(1)).classList.add('tab-active');
            document.getElementById('filter' + filter.charAt(0).toUpperCase() + filter.slice(1)).classList.remove('text-slate-400');

            renderVouchers();
        }

        async function renderVouchers() {
            const unspentView = document.getElementById('unspentView');
            const spentView = document.getElementById('spentView');
            const emptyState = document.getElementById('emptyState');

            try {
                const vouchers = await apiCall(`/vouchers?status=${currentFilter}`);

                if (vouchers.length === 0) {
                    unspentView.innerHTML = '';
                    spentView.innerHTML = '';
                    emptyState.classList.remove('hidden');
                    unspentView.classList.add('hidden');
                    spentView.classList.add('hidden');
                    return;
                }

                emptyState.classList.add('hidden');

                if (currentFilter === 'unspent') {
                    unspentView.classList.remove('hidden');
                    spentView.classList.add('hidden');

                    unspentView.innerHTML = vouchers.map(v => `
                        <div class="voucher-card rounded-2xl p-5 slide-in cursor-pointer" onclick="viewImageById('${v.id}')">
                            <div class="flex items-start justify-between mb-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-lg shadow-lg">
                                        ${v.retailer.charAt(0).toUpperCase()}
                                    </div>
                                    <div>
                                        <h3 class="font-bold text-white text-lg leading-tight">${escapeHtml(v.retailer)}</h3>
                                        <p class="text-xs text-slate-400 mt-0.5">Added ${formatDate(v.created_at)}</p>
                                    </div>
                                </div>
                                <button onclick="event.stopPropagation(); deleteVoucher('${v.id}')" class="delete-btn w-8 h-8 rounded-lg bg-rose-500/20 hover:bg-rose-500 flex items-center justify-center text-rose-400 hover:text-white transition-all">
                                    <i class="fas fa-trash-alt text-xs"></i>
                                </button>
                            </div>

                            <div class="mb-4">
                                <span class="amount-display text-3xl">£${parseFloat(v.value).toFixed(2)}</span>
                            </div>

                            ${v.code ? `<div class="mb-3 px-3 py-2 rounded-lg bg-slate-800/50 border border-slate-700/50">
                                <p class="text-xs text-slate-500 uppercase tracking-wider">Code</p>
                                <p class="text-sm font-mono text-indigo-300">${escapeHtml(v.code)}</p>
                            </div>` : ''}

                            ${v.expiry ? `<div class="mb-3 flex items-center gap-2 text-xs ${isExpired(v.expiry) ? 'text-rose-400' : 'text-amber-400'}">
                                <i class="fas fa-clock"></i>
                                <span>Expires: ${formatExpiry(v.expiry)} ${isExpired(v.expiry) ? '(Expired)' : ''}</span>
                            </div>` : ''}

                            ${v.notes ? `<p class="text-sm text-slate-400 mb-4 line-clamp-2">${escapeHtml(v.notes)}</p>` : '<div class="mb-4"></div>'}

                            <div class="flex items-center gap-2">
                                <button onclick="event.stopPropagation(); toggleVoucherStatus('${v.id}')" 
                                    class="status-badge flex-1 py-2.5 rounded-xl font-medium text-sm transition-all bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500 hover:text-white">
                                    <i class="fas fa-check mr-2"></i>
                                    Mark as Spent
                                </button>
                                ${v.image_url || v.image ? `<button onclick="event.stopPropagation(); viewImageById('${v.id}')" class="w-10 h-10 rounded-xl bg-slate-800 hover:bg-indigo-500 flex items-center justify-center text-slate-400 hover:text-white transition-all">
                                    <i class="fas fa-image"></i>
                                </button>` : ''}
                            </div>
                        </div>
                    `).join('');
                } else {
                    // Spent Timeline View
                    unspentView.classList.add('hidden');
                    spentView.classList.remove('hidden');

                    // Group by date
                    const grouped = groupByDate(vouchers);

                    spentView.innerHTML = Object.entries(grouped).map(([date, items]) => `
                        <div class="timeline-date-header">
                            <span class="text-sm font-semibold text-white">${date}</span>
                            <span class="text-xs text-slate-400 ml-2">${items.length} voucher${items.length !== 1 ? 's' : ''}</span>
                        </div>
                        ${items.map(v => `
                            <div class="timeline-item">
                                <div class="voucher-card spent rounded-2xl p-5 cursor-pointer" onclick="viewImageById('${v.id}')">
                                    <div class="flex items-start justify-between mb-3">
                                        <div class="flex items-center gap-3">
                                            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-slate-600 to-slate-700 flex items-center justify-center text-white font-bold shadow-lg">
                                                ${v.retailer.charAt(0).toUpperCase()}
                                            </div>
                                            <div>
                                                <h3 class="font-bold text-white text-lg leading-tight">${escapeHtml(v.retailer)}</h3>
                                                <span class="spent-by-badge">
                                                    <i class="fas fa-user-check"></i>
                                                    Spent by ${escapeHtml(v.spent_by || 'Unknown')}
                                                </span>
                                            </div>
                                        </div>
                                        <button onclick="event.stopPropagation(); deleteVoucher('${v.id}')" class="delete-btn w-8 h-8 rounded-lg bg-rose-500/20 hover:bg-rose-500 flex items-center justify-center text-rose-400 hover:text-white transition-all">
                                            <i class="fas fa-trash-alt text-xs"></i>
                                        </button>
                                    </div>

                                    <div class="flex items-center justify-between mb-3">
                                        <span class="amount-display spent-amount text-2xl">£${parseFloat(v.value).toFixed(2)}</span>
                                        <span class="text-xs text-slate-500">at ${formatTime(v.spent_at)}</span>
                                    </div>

                                    ${v.code ? `<div class="mb-2 px-3 py-1.5 rounded-lg bg-slate-800/30 border border-slate-700/30 inline-block">
                                        <span class="text-xs text-slate-500">Code:</span>
                                        <span class="text-sm font-mono text-slate-400 ml-1 line-through">${escapeHtml(v.code)}</span>
                                    </div>` : ''}

                                    ${v.notes ? `<p class="text-sm text-slate-500 line-clamp-2">${escapeHtml(v.notes)}</p>` : ''}

                                    <div class="mt-4 flex items-center gap-2">
                                        <button onclick="event.stopPropagation(); toggleVoucherStatus('${v.id}')" 
                                            class="status-badge flex-1 py-2 rounded-xl font-medium text-sm transition-all bg-indigo-500/20 text-indigo-400 hover:bg-indigo-500 hover:text-white">
                                            <i class="fas fa-undo mr-2"></i>
                                            Restore to Unspent
                                        </button>
                                        ${v.image_url || v.image ? `<button onclick="event.stopPropagation(); viewImageById('${v.id}')" class="w-10 h-10 rounded-xl bg-slate-800 hover:bg-indigo-500 flex items-center justify-center text-slate-400 hover:text-white transition-all">
                                            <i class="fas fa-image"></i>
                                        </button>` : ''}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    `).join('');
                }
            } catch (err) {
                showToast('Failed to load vouchers', 'error');
                console.error(err);
            }
        }

        function groupByDate(vouchers) {
            const groups = {};
            vouchers.forEach(v => {
                const date = new Date(v.spent_at);
                const dateKey = date.toLocaleDateString('en-GB', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });
                if (!groups[dateKey]) groups[dateKey] = [];
                groups[dateKey].push(v);
            });
            return groups;
        }

        async function viewImageById(id) {
            try {
                const voucher = await apiCall(`/vouchers/${id}`);
                viewImage(voucher);
            } catch (err) {
                showToast('Failed to load voucher', 'error');
            }
        }

        // ============================================
        // UTILITIES
        // ============================================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');

            const colors = {
                success: 'bg-emerald-500',
                error: 'bg-rose-500',
                info: 'bg-indigo-500'
            };

            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };

            toast.className = `toast glass-panel rounded-xl p-4 flex items-center gap-3 shadow-2xl border-l-4 ${colors[type].replace('bg-', 'border-')}`;
            toast.innerHTML = `
                <div class="w-8 h-8 rounded-full ${colors[type]} flex items-center justify-center">
                    <i class="fas ${icons[type]} text-white text-sm"></i>
                </div>
                <p class="text-white font-medium text-sm">${message}</p>
            `;

            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function formatTime(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        }

        function formatExpiry(dateStr) {
            if (!dateStr) return '';
            return new Date(dateStr).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function isExpired(dateStr) {
            if (!dateStr) return false;
            return new Date(dateStr) < new Date();
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeAddModal();
                closeImageModal();
            }
            if (e.key === 'n' && e.ctrlKey && currentUser) {
                e.preventDefault();
                openAddModal();
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const savedToken = sessionStorage.getItem('vv_token');
            const savedUser = sessionStorage.getItem('vv_user');

            if (savedToken && savedUser) {
                authToken = savedToken;
                currentUser = JSON.parse(savedUser);
                showMainApp();
            }
        });
    </script>
</body>
</html>
