# ============================================
# VoucherVault Wrangler Configuration
# ============================================
name = "voucher-vault-api"
main = "worker.js"
compatibility_date = "2024-01-01"

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "voucher-vault-db"
database_id = "YOUR_DATABASE_ID_HERE"

# R2 Bucket Binding
# The bucket does NOT need a public domain — images are served
# through the worker at /api/image/:key with auth enforcement.
[[r2_buckets]]
binding = "VOUCHER_IMAGES"
bucket_name = "voucher-images"

# Secrets — set via wrangler CLI, never commit these:
#   wrangler secret put SECRET_KEY    ← used in generateToken()
#   wrangler secret put PASSWORD_SALT ← used in hashPassword()
#
# After deploying, update YOUR_SECRET_KEY and YOUR_SALT in worker.js
# to read from env.SECRET_KEY and env.PASSWORD_SALT if you prefer
# environment-driven secrets over hardcoded strings.
